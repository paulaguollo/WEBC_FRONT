    <main>
      <form action="" method="get"> <!--colocar o post pra ser mais seguro e nao aparecer a resposta na barra -->
        <fieldset>
          <!--CAIXINHA-->
          <legend>Formulário de contactos do CESAE</legend>
          <label for="form-name">Nome: </label>
          <input type="text" name="form-name" id="" required placeholder="Insira o seu nome aqui"/>
          <br />

          <label for="email">Email: </label>
          <input type="email" name="form-email" id="form-email" /><br /><br />

          <label for="form-gender">Género:</label><br />
          <input type="radio" name="form-gender" id="form-genero-f" value="feminino" /> Feminino <br />
          <input type="radio" name="form-gender" id="form-genero-m" value="masculino" /> Masculino <br />
          <input type="radio" name="form-gender" id="form-genero-o" value="outro" /> Outro <br /><br />

          <label for="form-date">Data atual: </label>
          <input type="date" name="form-date" id="form-date" />

          <div>
            <label for="form-turma">Turma:</label>
            <select name="forma-turma" id="form-turma">
              <option value="" selected>Software Developer</option>
              <option value="">Outra</option>
            </select>
          </div>

          <div>
          <label for="form-mensagem">Mensagem: </label>
          <textarea name="form-mensagem" id="form-mensagem" cols="30" rows="3"></textarea>
         </div>

          <div>
            <input type="reset" value="Limpar" />
            <input type="submit" value="Enviar" />
          </div>
        </fieldset>
        <br />
      </form>
